<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Setor Mídia Turismo</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-tap-highlight-color: transparent;
      }
      ::selection {
        background-color: #dbeafe; /* blue-100 */
        color: #1e3a8a; /* blue-900 */
      }
    </style>
  </head>
  <body class="bg-slate-50">
    <div id="root"></div>
    <!-- Import Maps for ES Modules -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom": "https://esm.sh/react-dom@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react",
          "date-fns": "https://esm.sh/date-fns@3.3.1",
          "date-fns/locale": "https://esm.sh/date-fns@3.3.1/locale",
          "framer-motion": "https://esm.sh/framer-motion@11.0.8?external=react,react-dom",
          "clsx": "https://esm.sh/clsx@2.1.0",
          "tailwind-merge": "https://esm.sh/tailwind-merge@2.2.1",
          "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
      }
    </script>
    <script>
      // Limpa Service Workers antigos para evitar cache agressivo
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
    </script>
    <script type="module">
      // Adiciona um timestamp ao carregar o app.js para forçar o carregamento da versão mais recente
      const script = document.createElement('script');
      script.type = 'module';
      script.src = './app.js?v=' + Date.now();
      document.body.appendChild(script);
    </script>
  </body>
</html>
